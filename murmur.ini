# Murmur configuration for PTT server
# See: https://wiki.mumble.info/wiki/Murmur.ini

# Network
port=64738
host=0.0.0.0

# ICE interface for admin service
ice="tcp -h 0.0.0.0 -p 6502"

# Audio settings optimized for voice-only PTT
# Opus codec at 16-24kbps, no positional audio
opus_threshold=0
bandwidth=24000

# Server limits
users=50
textmessagelength=5000

# Welcome message
welcometext="<br/>Welcome to the PTT server.<br/>Use your PTT button to transmit."

# Logging
logfile=/data/murmur.log
logdays=31

# Security
autobanAttempts=10
autobanTimeframe=120
autobanTime=300

# SSL (Murmur generates self-signed cert by default)
# For custom certs, uncomment:
# sslCert=/data/cert.pem
# sslKey=/data/key.pem

# Server password (optional, for extra security)
# serverpassword=

# Registration
allowping=true
bonjour=false

# Database
database=/data/murmur.sqlite
