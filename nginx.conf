# =============================================================================
# PTT Server Nginx Configuration
# =============================================================================
# This config uses Nginx's stream module to route port 443 traffic by SNI:
#   - ptt.harro.ch:443  -> FastAPI admin dashboard (HTTPS)
#   - voice.harro.ch:443  -> Murmur voice server (Mumble TLS)
#
# Both subdomains point to the same VPS IP address.
# The stream module inspects the TLS ClientHello SNI field to decide routing.
#
# SETUP:
#   1. Set two DNS A records pointing to your VPS IP:
#      ptt.harro.ch -> <VPS_IP>
#      voice.harro.ch -> <VPS_IP>
#   2. Get TLS certs for both subdomains (see docs/deployment.md)
#   3. Domain is configured for ptt.harro.ch / voice.harro.ch
# =============================================================================

# --- Stream block: SNI-based routing on port 443 ---
# This runs OUTSIDE the http block. In Docker, we use a separate
# config file loaded via nginx.conf's include directive.
# See nginx-stream.conf for the stream block.

# --- HTTP block: admin dashboard ---
server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS (uncomment when TLS is configured)
    # return 301 https://$host$request_uri;

    # Development / initial setup: proxy to admin service on HTTP
    location / {
        proxy_pass http://admin:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS admin dashboard (receives traffic from stream SNI routing)
server {
    listen 8443 ssl http2;
    server_name ptt.harro.ch;

    ssl_certificate /etc/letsencrypt/live/ptt.harro.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ptt.harro.ch/privkey.pem;

    location / {
        proxy_pass http://admin:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
