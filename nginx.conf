# =============================================================================
# PTT Server Nginx HTTP Configuration
# =============================================================================
# Port 443 SNI routing is handled by nginx-stream.conf (separate file).
# This file handles:
#   - HTTP port 80: proxy to admin (always works, even without TLS)
#   - HTTPS port 8443: admin dashboard (receives traffic from SNI router)
#     Only active when TLS certificates exist.
# =============================================================================

# HTTP: serve admin dashboard (and redirect to HTTPS when certs are available)
server {
    listen 80;
    server_name _;

    # If certs exist, redirect to HTTPS. Otherwise serve directly.
    location / {
        proxy_pass http://admin:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS admin dashboard (only loaded if certs exist)
# nginx-stream.conf SNI routes ptt.harro.ch:443 -> 127.0.0.1:8443
include /etc/nginx/conf.d/ssl.conf*;
