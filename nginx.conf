# HTTP: redirect to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS admin dashboard (receives traffic from stream SNI routing on port 8443)
server {
    listen 8443 ssl http2;
    server_name ptt.harro.ch;

    ssl_certificate /etc/letsencrypt/live/ptt.harro.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ptt.harro.ch/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Internal-only admin endpoints (sip-bridge etc.) must never be
    # reachable from outside the docker network.
    location ~ ^/api/[^/]+/internal/ {
        return 404;
    }

    location / {
        proxy_pass http://admin:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
