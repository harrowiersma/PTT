# HTTPS admin dashboard (receives traffic from stream SNI routing on port 8443)
server {
    listen 8443 ssl http2;
    server_name ptt.harro.ch;

    ssl_certificate /etc/letsencrypt/live/ptt.harro.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ptt.harro.ch/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://admin:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
