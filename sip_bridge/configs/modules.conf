; sip-bridge/configs/modules.conf
;
; autoload=yes is the pragmatic choice for Ubuntu 24.04's Asterisk 20.6:
; Asterisk's real module dependency graph (bridges, stasis subsystems,
; sorcery backends, dialplan apps) is deeper than any hand-curated list
; tracks reliably across Asterisk versions. RAM overhead of loading the
; full module set inside a container is minor; the cost of module
; whack-a-mole on every apt update is not.
;
; The only noload entry is the one module whose symbol dependency is
; actually broken in Ubuntu's 20.6 build.

[modules]
autoload=yes

; ast_sip_subscription_set_persistence_data is undefined in Ubuntu
; 24.04's Asterisk 20.6. Loading this module triggers a dependency
; cascade that tears down the whole PJSIP stack. We do not use SIP
; presence / BLF subscriptions, so skipping it is safe.
noload => res_pjsip_dialog_info_body_generator.so
