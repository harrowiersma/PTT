; sip-bridge/configs/modules.conf
; Explicit load list — keep Asterisk lean. Anything not listed is noload.

[modules]
autoload=no

; Core
load => pbx_config.so
load => func_groupcount.so
load => func_callerid.so
load => func_channel.so
load => func_logic.so
load => func_strings.so

; Sorcery backends — PJSIP's config abstraction. Without these,
; res_pjproject fails to resolve dependencies and the entire PJSIP
; stack cascades into "Not Running". Discovered the hard way on the
; first Phase 2b-audio deploy.
load => res_sorcery_config.so
load => res_sorcery_memory.so
load => res_sorcery_astdb.so

; Stock dialplan apps used by the [didww-inbound] context.
load => app_answer.so
load => app_playtones.so

; PJSIP stack
load => res_pjproject.so
load => res_pjsip.so
load => res_pjsip_session.so
load => res_pjsip_authenticator_digest.so
load => res_pjsip_endpoint_identifier_user.so
load => res_pjsip_endpoint_identifier_ip.so
load => res_pjsip_endpoint_identifier_anonymous.so
load => res_pjsip_outbound_registration.so
load => res_pjsip_outbound_authenticator_digest.so
load => res_pjsip_registrar.so
load => res_pjsip_acl.so
load => res_pjsip_sdp_rtp.so
load => res_pjsip_notify.so
load => res_pjsip_caller_id.so
load => res_pjsip_dtmf_info.so
load => res_pjsip_rfc3326.so
; res_pjsip_dialog_info_body_generator.so intentionally NOT loaded:
; Ubuntu 24.04's Asterisk 20.6 build is missing its dependency symbol
; ast_sip_subscription_set_persistence_data. Loading it triggers a
; cascade that takes the whole PJSIP stack down. We do not use SIP
; presence/BLF subscriptions, so skipping it is safe.
load => chan_pjsip.so

; RTP
load => res_rtp_asterisk.so

; Codecs (ulaw/alaw only; Opus is Mumble-side)
load => codec_ulaw.so
load => codec_alaw.so

; Applications
load => app_stack.so
load => app_playback.so
load => app_dial.so
load => app_verbose.so
load => app_userevent.so
load => app_stasis.so

; File formats (needed by Playback)
load => format_wav.so
load => format_wav_gsm.so
load => format_pcm.so

; Stasis / ARI
load => res_stasis.so
load => res_stasis_answer.so
load => res_stasis_device_state.so
load => res_stasis_playback.so
load => res_stasis_recording.so
load => res_stasis_snoop.so

; HTTP + ARI REST + WebSocket
load => res_http_websocket.so
load => res_ari.so
load => res_ari_asterisk.so
load => res_ari_channels.so
load => res_ari_bridges.so
load => res_ari_events.so
load => res_ari_playbacks.so
