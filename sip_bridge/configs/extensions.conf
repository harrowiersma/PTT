; sip-bridge/configs/extensions.conf
; Inbound call dialplan. Up to PHONE_MAX_CALLS concurrent calls; anything
; beyond that gets 486 Busy. Priority 7 — multi-caller support: each
; concurrent call lands in its own Phone/Call-N sub-channel on the
; Python side, via a dedicated PTTPhone-N Mumble bot.
;
; Flow: Answer → Playback(greeting) → AudioSocket → Hangup
; AudioSocket hands the call to the Python TCP server on 127.0.0.1:9092,
; which allocates a free slot and bridges audio to a per-call PTTPhone-N
; Mumble user in the matching Phone/Call-N sub-channel.

[globals]

[didww-inbound]
exten => _X.,1,NoOp(Incoming from ${CALLERID(num)} to ${EXTEN})
 ; ENV(PHONE_MAX_CALLS) comes from the container environment (default 3
 ; if unset). Anything >= that count rejects with Busy(). Keep this
 ; in sync with PHONE_MAX_CALLS in audiosocket_bridge.py's slot pool.
 same => n,Set(MAX_CALLS=${IF($[${LEN(${ENV(PHONE_MAX_CALLS)})} > 0]?${ENV(PHONE_MAX_CALLS)}:3)})
 same => n,GotoIf($[${GROUP_COUNT(phone)} >= ${MAX_CALLS}]?busy)
 same => n,Set(GROUP()=phone)
 same => n,Answer()
 same => n,Wait(0.3)
 ; Fire the notification broadcast while the greeting plays. CURL blocks
 ; the dialplan but admin is on loopback and responds in < 200 ms, well
 ; inside the Wait before Playback. Each user with can_answer_calls=true
 ; gets a subtle whispered ding tone so they know a call is ringing.
 same => n,Set(CURLOPT(httpheader)=X-Internal-Auth: ${ENV(PTT_INTERNAL_API_SECRET)})
 ; POST with caller_id as query param (no body) — simplest path through
 ; Asterisk CURL() without JSON-content-type gymnastics.
 same => n,Set(NOTIFY_RESP=${CURL(http://127.0.0.1:8000/api/sip/internal/call-started?caller_id=${CALLERID(num)})})
 same => n,NoOp(notify response: ${NOTIFY_RESP})
 same => n,Playback(openptt-greeting)
 ; AudioSocket blocks until the peer closes the TCP connection or sends
 ; a hangup frame, then dialplan continues to Hangup(). Replaces the
 ; prior externalMedia + Stasis path which had one-way-audio issues on
 ; Asterisk 20.6 / Ubuntu 24.04.
 ; AudioSocket requires a properly-formatted UUID string (not the channel
 ; uniqueid). Since Phase 2b-audio is single-concurrent-call by design,
 ; a fixed UUID is fine — the call-identity already lives on the PJSIP
 ; channel, and AudioSocket only uses the UUID to correlate the TCP
 ; session to the dialplan.
 same => n,AudioSocket(00000000-0000-4000-8000-000000000001,127.0.0.1:9092)
 ; Stop the ding-notification loop in admin. Safe to call even if the
 ; loop already stopped (someone joined Phone).
 same => n,Set(CURLOPT(httpheader)=X-Internal-Auth: ${ENV(PTT_INTERNAL_API_SECRET)})
 same => n,Set(END_RESP=${CURL(http://127.0.0.1:8000/api/sip/internal/call-ended)})
 same => n,Hangup()
 same => n(busy),NoOp(Busy — one call already active)
 same => n,Busy(10)
