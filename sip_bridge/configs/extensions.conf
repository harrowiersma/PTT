; sip-bridge/configs/extensions.conf
; Inbound call dialplan. One concurrent call — second INVITE gets 486 Busy.
;
; Flow: Answer → Playback(greeting) → AudioSocket → Hangup
; AudioSocket hands the call to the Python TCP server on 127.0.0.1:9092,
; which bridges audio to the PTTPhone Mumble user in the Phone channel.

[globals]

[didww-inbound]
exten => _X.,1,NoOp(Incoming from ${CALLERID(num)} to ${EXTEN})
 same => n,GotoIf($[${GROUP_COUNT(phone)} > 0]?busy)
 same => n,Set(GROUP()=phone)
 same => n,Answer()
 same => n,Wait(0.3)
 same => n,Playback(openptt-greeting)
 ; AudioSocket blocks until the peer closes the TCP connection or sends
 ; a hangup frame, then dialplan continues to Hangup(). Replaces the
 ; prior externalMedia + Stasis path which had one-way-audio issues on
 ; Asterisk 20.6 / Ubuntu 24.04.
 same => n,AudioSocket(${CHANNEL(uniqueid)},127.0.0.1:9092)
 same => n,Hangup()
 same => n(busy),NoOp(Busy — one call already active)
 same => n,Busy(10)
