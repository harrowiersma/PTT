# Main Nginx configuration for PTT Server
# Loads both HTTP (admin dashboard) and Stream (SNI routing) modules

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

# Load the stream module for SNI-based TCP routing
load_module modules/ngx_stream_module.so;

events {
    worker_connections  1024;
}

# HTTP block: admin dashboard
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    include /etc/nginx/conf.d/*.conf;
}

# Stream block: SNI routing on port 443
# Routes ptt.harro.ch -> HTTPS admin
# Routes voice.harro.ch -> Murmur TCP passthrough
stream {
    include /etc/nginx/stream.d/*.conf;
}
