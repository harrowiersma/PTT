# =============================================================================
# Nginx Stream Module: SNI-based routing on port 443
# =============================================================================
# Routes TLS connections on port 443 based on Server Name Indication (SNI):
#   - ptt.harro.ch -> Nginx HTTPS (port 8443) -> FastAPI admin
#   - voice.harro.ch -> Murmur (port 64738) direct passthrough
#
# This file is loaded in the top-level nginx.conf via:
#   stream { include /etc/nginx/stream.d/*.conf; }
#
# The official nginx:alpine Docker image includes the stream module.
# =============================================================================

map $ssl_preread_server_name $backend {
    ptt.harro.ch    admin_https;
    voice.harro.ch    murmur_voice;
    default                 admin_https;
}

upstream admin_https {
    server 127.0.0.1:8443;
}

upstream murmur_voice {
    server murmur:64738;
}

server {
    listen 443;
    ssl_preread on;
    proxy_pass $backend;

    # Pass the real client IP to backends
    proxy_protocol on;
}
