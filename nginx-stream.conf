# SNI routing on port 443
# ptt.harro.ch -> internal HTTPS admin on port 8443
# voice.harro.ch -> Murmur on port 64738 (TCP passthrough)

map $ssl_preread_server_name $backend {
    ptt.harro.ch      admin_https;
    voice.harro.ch    murmur_voice;
    # Default to Murmur: Mumble clients often don't send SNI
    default           murmur_voice;
}

upstream admin_https {
    server 127.0.0.1:8443;
}

upstream murmur_voice {
    server murmur:64738;
}

server {
    listen 443;
    ssl_preread on;
    proxy_pass $backend;
}
