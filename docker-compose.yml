services:
  murmur:
    image: mumblevoip/mumble-server:latest
    ports:
      - "64738:64738/tcp"
      - "64738:64738/udp"
      # Map host 443 -> container 64738 for cellular networks that block non-standard ports
      - "443:64738/tcp"
    environment:
      MUMBLE_CONFIG_ICE: "tcp -h 0.0.0.0 -p 6502"
      MUMBLE_CONFIG_WELCOMETEXT: "<br/>Welcome to the Wiersma PTT server.<br/>Use your PTT button to transmit."
      MUMBLE_CONFIG_BANDWIDTH: "24000"
      MUMBLE_CONFIG_USERS: "50"
      MUMBLE_CONFIG_OPUS_THRESHOLD: "0"
      MUMBLE_CONFIG_AUTOBANATTEMPTS: "0"
    volumes:
      - murmur-data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ptt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ptt}
      POSTGRES_DB: ptt
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  traccar:
    image: traccar/traccar:latest
    ports:
      - "5055:5055/tcp"
      - "5055:5055/udp"
    volumes:
      - traccar-data:/opt/traccar/data
      - ./traccar.xml:/opt/traccar/conf/traccar.xml:ro
    depends_on:
      - admin
    restart: unless-stopped

  admin:
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - murmur
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8443:8443"
    volumes:
      - ./nginx-main.conf:/etc/nginx/nginx.conf:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - admin
    restart: unless-stopped

volumes:
  murmur-data:
  pgdata:
  traccar-data:
