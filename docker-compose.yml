services:
  murmur:
    image: mumblevoip/mumble-server:latest
    ports:
      - "64738:64738/tcp"
      - "64738:64738/udp"
      # Port 443 is now handled by Nginx SNI routing -> murmur:64738
      # Direct 64738 still available as fallback
    environment:
      MUMBLE_CONFIG_ICE: "tcp -h 0.0.0.0 -p 6502"
      MUMBLE_CONFIG_WELCOMETEXT: "<br/>Welcome to the openPTT TRX server.<br/>Use your PTT button to transmit."
      MUMBLE_CONFIG_BANDWIDTH: "24000"
      MUMBLE_CONFIG_USERS: "50"
      MUMBLE_CONFIG_OPUS_THRESHOLD: "0"
      MUMBLE_CONFIG_AUTOBANATTEMPTS: "0"
    volumes:
      - murmur-data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ptt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ptt}
      POSTGRES_DB: ptt
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  traccar:
    image: traccar/traccar:latest
    ports:
      - "5055:5055/tcp"
      - "5055:5055/udp"
    volumes:
      - traccar-data:/opt/traccar/data
      - ./traccar.xml:/opt/traccar/conf/traccar.xml:ro
    depends_on:
      - admin
    restart: unless-stopped

  admin:
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "8000"
    # Also publish admin on the host loopback so sip-bridge (which runs
    # in host network mode for correct SIP/RTP) can reach it. Nothing
    # external — 127.0.0.1 binding only.
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    volumes:
      # Docker socket so admin can both `exec sqlite3` inside the murmur
      # container (to create channels / reset user registrations) and
      # `restart` it afterwards. Edits run as murmur's own user so file
      # perms line up without having to mount the data volume here.
      # See server/murmur/admin_sqlite.py.
      - /var/run/docker.sock:/var/run/docker.sock:rw
    depends_on:
      - postgres
      - murmur
    restart: unless-stopped

  sip-bridge:
    build:
      context: ./sip_bridge
      dockerfile: Dockerfile
    # Host networking so pjsua2 binds to the public IP directly and the
    # SDP c= line advertises the real address. Bridged Docker networking
    # breaks SIP/RTP because the SDP reports the container IP and DIDWW
    # sends media to an unreachable destination.
    network_mode: host
    # host-network mode + AppArmor docker-default enforce policy blocks
    # UDP sendto() from the container, causing pjsua2's REGISTER to fail
    # with err=120001 "Operation not permitted". Unconfine just this
    # service — it's isolated to SIP/RTP traffic only.
    security_opt:
      - apparmor:unconfined
    environment:
      ADMIN_INTERNAL_URL: "http://127.0.0.1:8000"
      PTT_INTERNAL_API_SECRET: "${PTT_INTERNAL_API_SECRET}"
      LOCAL_SIP_PORT: "5060"
      LOG_LEVEL: "${SIP_LOG_LEVEL:-INFO}"
      MUMBLE_HOST: "127.0.0.1"
      MUMBLE_PORT: "64738"
      # Downlink (Mumble → phone) volume. 0.5 = -6 dBFS; lower if phone
      # audio is hot, higher if too quiet. Applied per 20 ms frame on
      # the AudioSocket send path.
      DOWNLINK_GAIN: "${DOWNLINK_GAIN:-0.5}"
    depends_on:
      - admin
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-main.conf:/etc/nginx/nginx.conf:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-stream.conf:/etc/nginx/stream.d/ptt.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - admin
    restart: unless-stopped

volumes:
  murmur-data:
  pgdata:
  traccar-data:
