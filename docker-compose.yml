services:
  murmur:
    image: mumblevoip/mumble-server:latest
    ports:
      - "64738:64738/tcp"
      - "64738:64738/udp"
    volumes:
      - murmur-data:/data
      - ./murmur.ini:/etc/mumble/mumble-server.ini:ro
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ptt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ptt}
      POSTGRES_DB: ptt
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  admin:
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - murmur
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-main.conf:/etc/nginx/nginx.conf:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - admin
    restart: unless-stopped

volumes:
  murmur-data:
  pgdata:
